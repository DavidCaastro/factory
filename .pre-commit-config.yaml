# PIV/OAC Framework — Pre-commit hooks
# =============================================================================
# Protege el FRAMEWORK (rama agent-configs).
# Para hooks del PRODUCTO ver: specs/_templates/ci/pre-commit-config.yaml
# =============================================================================

repos:
  # Detección de secretos — escanea todos los archivos de framework
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: >
          (?x)^(
            \.piv/|
            logs_veracidad/|
            engram/
          )$

  # Check 4 del Framework Quality Gate — sin [PENDIENTE] en archivos de framework
  - repo: local
    hooks:
      - id: no-pendiente-in-framework
        name: "Check 4 — No [PENDIENTE] in framework files"
        language: system
        entry: >
          bash -c '
          found=$(grep -rn "\[PENDIENTE\]"
            registry/ skills/ agent.md CLAUDE.md LAYERS.md 2>/dev/null || true);
          if [ -n "$found" ]; then
            echo "ERROR: [PENDIENTE] found in framework files:";
            echo "$found";
            exit 1;
          fi;
          echo "PASS: No [PENDIENTE] in framework files"'
        pass_filenames: false
        always_run: true
