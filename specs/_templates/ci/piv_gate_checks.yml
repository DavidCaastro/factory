name: PIV/OAC Gate Checks — Product CI
# =============================================================================
# PLANTILLA — Copiar al repo del producto como .github/workflows/piv_gate_checks.yml
# Aplica a cualquier producto artefacto: aplicación, servicio, versión de framework.
# NO ejecutar en el repo del framework directivo (agent-configs es inmutable).
#
# Antes de usar: reemplazar los marcadores:
#   {{SRC_DIR}}   → directorio fuente del producto (ej: src, app, backend)
#   {{TEST_DIR}}  → directorio de tests (ej: tests, test, spec)
#   {{COV_FAIL}}  → umbral mínimo de cobertura (ej: 95) — ver specs/active/quality.md
#   {{PYTHON}}    → versión de Python requerida (ej: "3.11")
#
# Fuente: agent-configs/specs/_templates/ci/piv_gate_checks.yml
# Generado por: INIT protocol (ver skills/init.md)
#
# Regla de promoción staging → main (invariante para todo producto artefacto):
#   1. CI verde en staging (push trigger) — bloqueante antes de Gate 3 humano
#   2. PR staging→main dispara CI nuevamente (pull_request trigger)
#   3. gate-source-branch bloquea cualquier PR a main que no venga de staging
#   4. Solo cuando CI del PR es GREEN + confirmación humana → merge a main
# =============================================================================

on:
  push:
    branches: [staging]
  pull_request:
    branches: [main]

jobs:
  # ── Gate: origen del PR a main debe ser staging ─────────────────────────────
  gate-source-branch:
    name: Gate — PR to main must come from staging
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Verify source branch is staging
        run: |
          SRC="${{ github.head_ref }}"
          BASE="${{ github.base_ref }}"
          echo "PR: $SRC → $BASE"
          if [ "$BASE" = "main" ] && [ "$SRC" != "staging" ]; then
            echo "FAIL: Direct merge to main is only allowed from staging."
            echo "      Source detected: $SRC"
            echo "      Promote via: feature/<task> → staging → main"
            exit 1
          fi
          echo "PASS: Source branch is staging — promotion path is valid"

  gate-security:
    name: Gate 2b — SecurityAgent (deterministic tools)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "{{PYTHON}}"

      - name: Install dependencies
        run: pip install -r requirements.txt pip-audit

      - name: Scan for hardcoded secrets (grep)
        run: |
          echo "=== Scanning for hardcoded secrets in {{SRC_DIR}}/ ==="
          PATTERNS=(
            'password\s*=\s*["'"'"'][^$]'
            'secret\s*=\s*["'"'"'][^$]'
            'api_key\s*=\s*["'"'"'][^$]'
            'SECRET_KEY\s*=\s*["'"'"']'
          )
          FOUND=0
          for pattern in "${PATTERNS[@]}"; do
            matches=$(grep -rn -E "$pattern" {{SRC_DIR}}/ 2>/dev/null || true)
            if [ -n "$matches" ]; then
              echo "FAIL: Hardcoded secret pattern detected:"
              echo "$matches"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 0 ]; then
            echo "PASS: No hardcoded secrets detected"
          fi
          exit $FOUND

      - name: CVE scan (pip-audit)
        run: |
          echo "=== CVE scan ==="
          pip-audit --requirement requirements.txt --format=json | \
            python -c "
          import json, sys
          data = json.load(sys.stdin)
          vulns = [d for d in data.get('dependencies', []) if d.get('vulns')]
          if vulns:
              for d in vulns:
                  for v in d['vulns']:
                      sev = v.get('fix_versions', ['no fix'])
                      print(f'FAIL: {d[\"name\"]} — {v[\"id\"]} (fix: {sev})')
              sys.exit(1)
          print('PASS: No CVEs detected')
          "

  gate-standards:
    name: Gate 2 — StandardsAgent (quality tools)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "{{PYTHON}}"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          echo "=== Ruff lint — {{SRC_DIR}}/ ==="
          ruff check {{SRC_DIR}}/
          echo "PASS: ruff — 0 errors"

      - name: Tests + coverage (pytest-cov)
        env:
          JWT_SECRET_KEY: ci-test-secret-key
        run: |
          echo "=== Tests + coverage (umbral: {{COV_FAIL}}%) ==="
          python -m pytest {{TEST_DIR}}/ \
            --cov={{SRC_DIR}} \
            --cov-report=term-missing \
            --cov-fail-under={{COV_FAIL}} \
            -q

  gate-conformance:
    name: Branch protection conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify commit message format and branch flow
        run: |
          HEAD=${{ github.sha }}
          COMMIT_MSG=$(git log -1 --format="%s" $HEAD)
          BASE="${{ github.event.pull_request.base.ref }}"
          echo "=== Branch conformance ==="
          echo "Base: ${BASE:-staging (push)}"
          echo "Commit: $COMMIT_MSG"
          if [ -n "$BASE" ] && ! echo "$COMMIT_MSG" | grep -qE "^(Merge|fix|feat|refactor|docs|chore|release|revert)"; then
            echo "WARN: Commit message does not follow conventional commits format"
          fi
          echo "PASS: Branch conformance check complete"
