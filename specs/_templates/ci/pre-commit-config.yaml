# PIV/OAC Product — Pre-commit hooks (PLANTILLA)
# =============================================================================
# PLANTILLA — Copiar al repo del producto como .pre-commit-config.yaml
# NO usar en el repo del framework (agent-configs).
#
# Antes de usar: reemplazar {{SRC_DIR}} con el directorio fuente del producto
# (ej: src, app, backend).
#
# Instalación en el repo del producto:
#   cp .pre-commit-config.yaml <repo_producto>/
#   cd <repo_producto> && pre-commit install
#
# Fuente: agent-configs/specs/_templates/ci/pre-commit-config.yaml
# =============================================================================

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^{{SRC_DIR}}/   # Reemplazar con el directorio fuente del producto

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: >
          (?x)^(
            tests/|
            \.piv/|
            logs_veracidad/|
            engram/
          )$
