name: SecOps Passive Scan

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target a escanear (piv-oac-sdk | all)'
        required: false
        default: 'all'

jobs:
  secops-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Necesario para hacer push de reports/ a sec-ops

    steps:
      - name: Checkout sec-ops
        uses: actions/checkout@v4
        with:
          ref: sec-ops
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0   # Necesario para git show <otras-ramas>

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SecOps Scanner
        run: pip install -e . --quiet

      # ── Target: piv-oac-sdk ─────────────────────────────────────────────────
      - name: Extract PIV-OAC SDK manifest
        if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'piv-oac-sdk' }}
        run: |
          mkdir -p /tmp/scan-targets/piv-oac-sdk
          git show origin/agent-configs:sdk/pyproject.toml > /tmp/scan-targets/piv-oac-sdk/pyproject.toml

      - name: Scan PIV-OAC SDK dependencies
        if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'piv-oac-sdk' }}
        run: |
          python -m secops scan \
            --root /tmp/scan-targets/piv-oac-sdk \
            --directive \
            --reports-dir reports/ \
            --no-progress

      # ── Commit reports ────────────────────────────────────────────────────────
      - name: Commit segmented reports to sec-ops
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          if git diff --cached --quiet; then
            echo "No changes in reports — nothing to commit"
          else
            git commit -m "chore(secops): automated scan $(date -u +%Y-%m-%dT%H:%MZ)"
            git push origin sec-ops
          fi
