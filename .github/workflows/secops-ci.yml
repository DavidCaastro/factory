name: SecOps Scanner — Product CI
# =============================================================================
# CI para el producto SecOps Scanner en ramas de entrega.
#
# Triggers:
#   push → staging  : validación completa antes de promover a main
#   push → main     : gate final de entrega
#
# Gates:
#   1. Integridad estructural    — módulos y archivos críticos presentes
#   2. Cero dependencias runtime — pyproject.toml:dependencies=[]
#   3. Linting (ruff)            — 0 errores
#   4. Tests + cobertura         — ≥85% global, motores ≥90%
#   5. Sin secretos hardcoded    — scan de credenciales en código fuente
# =============================================================================

on:
  push:
    branches: [staging, main]

jobs:

  # ── Gate 1: integridad estructural del módulo ────────────────────────────
  gate-structure:
    name: Gate 1 — Estructura del módulo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verificar archivos críticos del producto
        run: |
          REQUIRED=(
            "secops/__init__.py"
            "secops/__main__.py"
            "secops/scanner/main.py"
            "secops/scanner/detect.py"
            "secops/scanner/fetcher.py"
            "secops/scanner/ast_engine.py"
            "secops/scanner/taint_analyzer.py"
            "secops/scanner/contract_verifier.py"
            "secops/scanner/behavioral_delta.py"
            "secops/scanner/report.py"
            "secops/scanner/impact.py"
            "secops/scanner/bridge.py"
            "secops/scanner/cli.py"
            "secops/SECOPS.md"
            "pyproject.toml"
            "tests/secops/test_fetcher.py"
            "tests/secops/test_impact.py"
            "tests/secops/test_integration_pipeline.py"
          )
          ERRORS=0
          for f in "${REQUIRED[@]}"; do
            if [ -f "$f" ]; then
              echo "PASS: $f"
            else
              echo "FAIL: $f — archivo crítico ausente"
              ERRORS=$((ERRORS + 1))
            fi
          done
          exit $ERRORS

  # ── Gate 2: cero dependencias de terceros en runtime ────────────────────
  gate-zero-deps:
    name: Gate 2 — Cero dependencias runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verificar dependencies=[] en pyproject.toml
        run: |
          python3 - <<'EOF'
          import tomllib, sys, pathlib

          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          deps = data.get("project", {}).get("dependencies", None)

          if deps is None:
              print("FAIL: pyproject.toml no tiene campo [project].dependencies")
              sys.exit(1)

          if len(deps) > 0:
              print(f"FAIL: Se encontraron {len(deps)} dependencias runtime:")
              for d in deps:
                  print(f"  - {d}")
              print("El módulo debe operar con cero dependencias de terceros (solo stdlib).")
              sys.exit(1)

          print("PASS: dependencies=[] — cero dependencias runtime confirmado")
          EOF

      - name: Verificar que los motores no importan herramientas de análisis externas
        run: |
          FORBIDDEN="bandit|semgrep|safety|trivy|pip.audit|snyk"
          MATCHES=$(grep -rn -E "import ($FORBIDDEN)|from ($FORBIDDEN)" \
                    secops/scanner/ 2>/dev/null || true)
          if [ -n "$MATCHES" ]; then
            echo "FAIL: Imports de herramientas externas detectados en motores:"
            echo "$MATCHES"
            exit 1
          fi
          echo "PASS: Sin imports de herramientas externas en motores"

  # ── Gate 3: linting ──────────────────────────────────────────────────────
  gate-lint:
    name: Gate 3 — Linting (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install --quiet ruff

      - name: Run ruff — 0 errores permitidos
        run: |
          ruff check secops/ --output-format=concise
          echo "PASS: ruff sin errores"

  # ── Gate 4: tests + cobertura ────────────────────────────────────────────
  gate-tests:
    name: Gate 4 — Tests + Cobertura
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install secops + dev dependencies
        run: |
          pip install --quiet -e .
          pip install --quiet pytest pytest-cov

      - name: Run pytest con cobertura global ≥85%
        run: |
          pytest tests/secops/ \
            --cov=secops \
            --cov-report=term-missing \
            --cov-fail-under=85 \
            -q

      - name: Verificar cobertura de motores de análisis ≥90%
        run: |
          python3 - <<'EOF'
          import subprocess, sys, json

          result = subprocess.run(
              ["python", "-m", "pytest", "tests/secops/",
               "--cov=secops/scanner",
               "--cov-report=json",
               "-q", "--tb=no"],
              capture_output=True, text=True
          )

          import pathlib
          cov_file = pathlib.Path("coverage.json")
          if not cov_file.exists():
              print("WARN: coverage.json no generado — omitiendo check de motores")
              sys.exit(0)

          data = json.loads(cov_file.read_text())
          files = data.get("files", {})

          MOTOR_MODULES = [
              "taint_analyzer",
              "contract_verifier",
              "behavioral_delta",
          ]
          THRESHOLD = 90
          errors = 0

          for module in MOTOR_MODULES:
              match = next(
                  (k for k in files if module in k),
                  None
              )
              if match is None:
                  print(f"WARN: {module} no encontrado en reporte de cobertura")
                  continue
              pct = files[match]["summary"]["percent_covered"]
              status = "PASS" if pct >= THRESHOLD else "FAIL"
              print(f"{status}: {module} — {pct:.1f}% (umbral: {THRESHOLD}%)")
              if pct < THRESHOLD:
                  errors += 1

          sys.exit(errors)
          EOF

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secops-coverage
          path: coverage.json

  # ── Gate 5: sin secretos hardcoded ──────────────────────────────────────
  gate-secrets:
    name: Gate 5 — Sin secretos hardcoded
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan de credenciales en código fuente
        run: |
          PLACEHOLDER_FILTER='"[.][.][.]"\|"<[^"]*>"\|"your-\|"PLACEHOLDER\|"REPLACE_ME\|example\|test'

          PATTERNS=(
            '\bpassword\b\s*[:=]\s*["'"'"'][^$\{]'
            '\bsecret\b\s*[:=]\s*["'"'"'][^$\{]'
            '\bapi_key\b\s*[:=]\s*["'"'"'][^$\{]'
            'Bearer [A-Za-z0-9\-_\.]{20,}'
            'sk-[A-Za-z0-9]{48,}'
          )
          FOUND=0
          for pattern in "${PATTERNS[@]}"; do
            matches=$(grep -rn -E "$pattern" \
              --include="*.py" --include="*.json" --include="*.yml" \
              --exclude-dir=".git" --exclude-dir="deps_cache" \
              secops/ 2>/dev/null \
              | grep -v "$PLACEHOLDER_FILTER" \
              || true)
            if [ -n "$matches" ]; then
              echo "FAIL: Posible secreto hardcoded detectado:"
              echo "$matches"
              FOUND=1
            fi
          done
          [ "$FOUND" -eq 0 ] && echo "PASS: Sin secretos hardcoded en secops/"
          exit $FOUND
